<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6600"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="580" rx="320" ry="40" fill="rgba(0,0,0,0.15)"/>
  <g transform="translate(400,300)">
    <!-- Bulldozer body -->
    <rect x="-80" y="-60" width="160" height="90" rx="10" fill="#CC5500"/>
    <rect x="-70" y="-70" width="140" height="70" rx="8" fill="#FF6600"/>
    <!-- Cabin -->
    <rect x="20" y="-80" width="60" height="20" rx="4" fill="#FF8833"/>
    <rect x="25" y="-78" width="50" height="15" rx="3" fill="#332200" opacity="0.5"/>
    <!-- Tracks -->
    <rect x="-100" y="10" width="200" height="40" rx="20" fill="#332200"/>
    <rect x="-90" y="15" width="180" height="8" rx="4" fill="#664400"/>
    <rect x="-90" y="30" width="180" height="8" rx="4" fill="#664400"/>
    <!-- Blade -->
    <rect x="-120" y="-30" width="40" height="70" rx="5" fill="#CC5500"/>
    <rect x="-125" y="-35" width="50" height="10" rx="3" fill="#442200"/>
    <!-- Ripper -->
    <rect x="100" y="0" width="25" height="30" rx="3" fill="#CC5500"/>
    <rect x="108" y="-10" width="10" height="15" rx="2" fill="#442200"/>
    <!-- Track wheels -->
    <circle cx="-60" cy="30" r="10" fill="#442200"/>
    <circle cx="-20" cy="30" r="10" fill="#442200"/>
    <circle cx="20" cy="30" r="10" fill="#442200"/>
    <circle cx="60" cy="30" r="10" fill="#442200"/>
  </g>
  <text x="400" y="520" text-anchor="middle" font-family="Georgia,serif" font-size="42" font-weight="bold" fill="#442200" opacity="0.9">Caterpillar D9</text>
  <text x="400" y="555" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#664400" opacity="0.6">1970 · 1:50 · NZG</text>
</svg>